<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ERP System</title>
    <!-- Bootstrap CSS for grid -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Google OAuth Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-bg d-flex justify-content-center align-items-center vh-100">

<div class="container login-content">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="glass-panel p-5 text-center">
                
                <div class="mb-4">
                    <!-- Brand Icon or Logo placeholder -->
                    <div class="mx-auto bg-primary d-flex align-items-center justify-content-center" style="width: 60px; height: 60px; border-radius: 16px; background: linear-gradient(135deg, var(--primary-color) 0%, #0ea5e9 100%);">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                    </div>
                </div>

                <h3 class="mb-2 fw-bold text-gradient">ERP Platform</h3>
                <p class="text-muted mb-4" style="font-size: 0.9rem;">Sign in to manage Purchase Orders</p>
                
                <!-- Custom Mock Login -->
                <button class="btn btn-premium w-100 mb-3" onclick="mockLogin()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Developer Bypass Login
                </button>
                
                <div class="d-flex align-items-center mb-3">
                    <div class="flex-grow-1 border-bottom border-secondary"></div>
                    <span class="px-3 text-muted" style="font-size: 0.8rem;">or continue with</span>
                    <div class="flex-grow-1 border-bottom border-secondary"></div>
                </div>

                <!-- Google Sign-In -->
                <div class="d-flex justify-content-center">
                    <div id="g_id_onload"
                         data-client_id="606927583303-egr9kpfqddv21vmtdibutnitsf2stv69.apps.googleusercontent.com"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleCredentialResponse"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = window.location.origin.includes('localhost') ? "http://localhost:8000" : "";

    // Decode a JWT payload (base64) without a library
    function decodeJwtPayload(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(c =>
                '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
            ).join(''));
            return JSON.parse(jsonPayload);
        } catch(e) {
            return null;
        }
    }

    function mockLogin() {
        // Store mock user profile info
        localStorage.setItem("erp_user_name", "Test User");
        localStorage.setItem("erp_user_email", "testuser@example.com");
        localStorage.removeItem("erp_user_picture");
        sendTokenToBackend("dummy-google-jwt-token");
    }

    function handleCredentialResponse(response) {
        console.log("Google Sign-In successful");

        // Decode the Google JWT to extract profile info
        const payload = decodeJwtPayload(response.credential);
        if (payload) {
            if (payload.picture) localStorage.setItem("erp_user_picture", payload.picture);
            if (payload.name)    localStorage.setItem("erp_user_name", payload.name);
            if (payload.email)   localStorage.setItem("erp_user_email", payload.email);
        }

        sendTokenToBackend(response.credential);
    }

    async function sendTokenToBackend(token) {
        try {
            const res = await fetch(`${API_BASE_URL}/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token: token })
            });

            if(res.ok) {
                const data = await res.json();
                localStorage.setItem("erp_token", data.access_token);
                window.location.href = "dashboard.html";
            } else {
                const errData = await res.json();
                alert("Login failed! " + (errData.detail || "Please try again."));
                console.error("Backend Error:", errData);
            }
        } catch(error) {
            console.error("Error during login:", error);
            alert("Network error. Is the backend running?");
        }
    }
</script>

</body>
</html>
